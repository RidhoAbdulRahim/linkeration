<head>
<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f472b6;
    --sky: #7dd3fc;
    --lilac: #c084fc;
    --bg: #fdf4fb;
    --text: #1a1025;
    --sub: #64748b;
    --glass: rgba(255, 255, 255, 0.65);
    --border: rgba(255, 255, 255, 0.4);
    --inner-glow: rgba(255, 255, 255, 0.5);
  }

  [data-theme="dark"] {
    --bg: #030712;
    --text: #f9fafb;
    --sub: #94a3b8;
    --glass: rgba(17, 24, 39, 0.7);
    --border: rgba(255, 255, 255, 0.08);
    --inner-glow: rgba(255, 255, 255, 0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }
  
  body {
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 80px 24px;
    transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Canvas for Particles */
  #canvas {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1;
  }

  .bg-mesh {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .bg-mesh span {
    position: absolute; border-radius: 50%; filter: blur(120px);
    opacity: 0.3; animation: float 25s ease-in-out infinite alternate;
  }
  .bg-mesh span:nth-child(1) { width: 50vw; height: 50vw; background: var(--rose); top: -10%; right: -5%; }
  .bg-mesh span:nth-child(2) { width: 40vw; height: 40vw; background: var(--sky); bottom: -5%; left: -5%; animation-delay: -7s; }

  @keyframes float { from{transform:translate(0,0) rotate(0deg)} to{transform:translate(-50px,80px) rotate(15deg)} }

  .wrapper { max-width: 420px; width: 100%; position: relative; z-index: 10; }

  /* Header Section */
  .profile { text-align: center; margin-bottom: 48px; }
  
  .avatar-ring {
    width: 128px; height: 128px; margin: 0 auto 24px;
    position: relative; border-radius: 50%; padding: 4px;
    background: linear-gradient(135deg, var(--rose), var(--sky), var(--lilac));
    box-shadow: 0 20px 40px -10px rgba(244, 114, 182, 0.3);
  }
  
  .avatar { 
    width: 100%; height: 100%; border-radius: 50%; 
    background: #e5e7eb; object-fit: cover; border: 4px solid var(--bg);
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 3rem; font-weight: 900; line-height: 1.1;
    margin-bottom: 12px; letter-spacing: -0.03em;
    background: linear-gradient(90deg, var(--text), var(--rose), var(--text));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }

  @keyframes shimmer { to { background-position: 200% center; } }

  .username {
    font-size: 0.85rem; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.4em;
  }

  /* Links List */
  .links { display: grid; gap: 16px; }

  .link-card {
    background: var(--glass);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    padding: 18px 24px; border-radius: 24px;
    text-decoration: none; color: var(--text);
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.03), inset 0 0 15px var(--inner-glow);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 0; transform: translateY(20px);
    animation: slideUp 0.6s forwards;
    cursor: pointer;
  }

  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

  .link-card:nth-child(1) { animation-delay: 0.1s; --hover-clr: #25D366; }
  .link-card:nth-child(2) { animation-delay: 0.2s; --hover-clr: #E1306C; }
  .link-card:nth-child(3) { animation-delay: 0.3s; --hover-clr: #00f2ea; }
  .link-card:nth-child(4) { animation-delay: 0.4s; --hover-clr: #FF0000; }
  .link-card:nth-child(5) { animation-delay: 0.5s; --hover-clr: #44a6f1; }

  .link-card:hover {
    transform: translateY(-5px) scale(1.02);
    background: var(--text); color: var(--bg);
    border-color: var(--hover-clr);
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
  }

  .link-content { display: flex; align-items: center; gap: 16px; pointer-events: none; }
  .link-content span { font-weight: 600; font-size: 1.05rem; }
  .icon-svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* Interface Elements */
  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    background: var(--glass); border: 1px solid var(--border);
    width: 44px; height: 44px; border-radius: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--text);
    transition: 0.3s ease;
  }

  .music-player {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--glass); padding: 10px 24px; border-radius: 100px;
    display: flex; align-items: center; gap: 16px; backdrop-filter: blur(24px);
    border: 1px solid var(--border); z-index: 100;
  }
  .play-btn {
    background: var(--rose); color: white; border: none;
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #youtube-player { position: absolute; visibility: hidden; width: 0; height: 0; }
</style>

<script>
  // Canvas Particles
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.size = Math.random() * 3 + 1;
      this.speedX = Math.random() * 1 - 0.5;
      this.speedY = Math.random() * 1 - 0.5;
      this.opacity = 1;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.opacity -= 0.01;
    }
    draw() {
      ctx.fillStyle = `rgba(244, 114, 182, ${this.opacity})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  window.addEventListener('mousemove', (e) => {
    for(let i=0; i<2; i++) particles.push(new Particle(e.x, e.y));
  });

  function animate() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    for(let i=0; i<particles.length; i++) {
      particles[i].update();
      particles[i].draw();
      if(particles[i].opacity <= 0) {
        particles.splice(i, 1); i--;
      }
    }
    requestAnimationFrame(animate);
  }
  animate();

  // Theme Toggle
  const themeBtn = document.getElementById('themeBtn');
  const themeIcon = document.getElementById('themeIcon');
  themeBtn.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeIcon.innerHTML = isDark 
      ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>' 
      : '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  });

  // YouTube API Integration
  let player;
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
      videoId: 'wAukvwLCVbM',
      playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'wAukvwLCVbM' },
      events: { 'onStateChange': onPlayerStateChange }
    });
  }

  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  playBtn.addEventListener('click', () => {
    if (player.getPlayerState() === 1) { player.pauseVideo(); } else { player.playVideo(); }
  });

  function onPlayerStateChange(event) {
    if (event.data === 1) {
      playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
    } else {
      playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
    }
  }
</script>
