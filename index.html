<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridho</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#06070a;
--text:#ffffff;
--muted:#9aa0aa;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--accent:#7c5cff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* Animated background gradient */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 25%, #7c5cff33, transparent 40%),
radial-gradient(circle at 85% 75%, #00e0ff33, transparent 40%);
animation:backgroundShift 12s ease-in-out infinite alternate;
z-index:0;
}

@keyframes backgroundShift{
from{transform:translateY(-20px);}
to{transform:translateY(20px);}
}

/* Subtle grain */

body::after{
content:"";
position:fixed;
inset:0;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.04;
pointer-events:none;
z-index:1;
}

/* Card */

.card{
position:relative;
z-index:2;
width:100%;
max-width:560px;
padding:70px;
background:var(--glass);
backdrop-filter:blur(35px);
border:1px solid var(--border);
border-radius:32px;
box-shadow:
0 0 80px rgba(124,92,255,0.15),
0 20px 60px rgba(0,0,0,0.6);
transition:transform 0.4s ease;
}

/* 3D tilt */

.card:hover{
transform:rotateX(2deg) rotateY(-2deg);
}

/* Profile */

.profile{
width:96px;
height:96px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,0.2);
margin-bottom:36px;
}

/* Typography */

h1{
font-size:36px;
font-weight:700;
letter-spacing:-0.03em;
}

.username{
margin-top:8px;
color:var(--muted);
font-size:15px;
}

.quote{
margin-top:40px;
font-size:17px;
line-height:1.7;
color:#d8dbe3;
max-width:440px;
}

/* Links */

.links{
margin-top:70px;
display:flex;
flex-direction:column;
gap:20px;
}

.link{
position:relative;
padding:20px 26px;
border-radius:16px;
text-decoration:none;
color:var(--text);
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
transition:all 0.3s cubic-bezier(.16,1,.3,1);
overflow:hidden;
font-size:16px;
font-weight:500;
}

.link::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg, transparent, rgba(124,92,255,0.4), transparent);
transform:translateX(-100%);
transition:transform 0.8s ease;
}

.link:hover::before{
transform:translateX(100%);
}

.link:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 25px 60px rgba(124,92,255,0.35);
border-color:var(--accent);
}

/* Footer */

footer{
margin-top:60px;
font-size:13px;
color:var(--muted);
}

/* Entrance animation */

.card{
animation:fadeUp 1s cubic-bezier(.16,1,.3,1);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Reduced motion */

@media (prefers-reduced-motion: reduce){
.card,
.link{
animation:none;
transition:none;
}
}
</style>
</head>

<body>

<div class="card">

<img src="profile.jpg" alt="Profile photo" class="profile">

<h1>Ridho</h1>
<div class="username">@ridhogeprek</div>

<p class="quote">
Focused on continuous growth, disciplined execution, and long-term evolution.
</p>

<div class="links">
<a href="https://discord.com/users/ridhogeprek" class="link">Discord</a>
<a href="https://wa.me/6287753475412" class="link">WhatsApp</a>
<a href="https://youtube.com/@y4timz" class="link">YouTube</a>
<a href="https://tiktok.com/@idogeprek" class="link">TikTok</a>
<a href="https://instagram.com/ridhogeprek" class="link">Instagram</a>
<a href="https://www.roblox.com/search/users?keyword=y4timz" class="link">Roblox</a>
</div>

<footer>
© <script>document.write(new Date().getFullYear())</script>
</footer>

</div>

</body>
</html>
