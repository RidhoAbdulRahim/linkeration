<style>
:root{
--bg:#0b0c10;
--card:rgba(20,21,28,0.75);
--text:#f5f6fa;
--muted:#9ea2ad;
--gold:#d6a85f;
--blue:#4ea8ff;
--magenta:#c84eff;
--border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#0b0c10,#12141c,#151726,#0b0c10);
background-size:400% 400%;
animation:gradientShift 20s ease infinite;
color:var(--text);
min-height:100vh;
overflow-x:hidden;
cursor:none;
}

@keyframes gradientShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* floating color lights */
body::before{
content:"";
position:fixed;
inset:-50%;
background:
radial-gradient(circle at 20% 30%, #d6a85f33, transparent 40%),
radial-gradient(circle at 80% 70%, #4ea8ff33, transparent 40%),
radial-gradient(circle at 50% 90%, #c84eff22, transparent 40%);
animation:moveLights 25s linear infinite alternate;
z-index:-1;
}

@keyframes moveLights{
0%{transform:translate(0,0);}
100%{transform:translate(-5%, -5%);}
}

/* cursor aura */
.cursor{
position:fixed;
width:22px;
height:22px;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
background:radial-gradient(circle,var(--gold),transparent 70%);
mix-blend-mode:screen;
z-index:9999;
transition:0.08s linear;
}

/* layout */
.container{
max-width:880px;
margin:auto;
padding:160px 28px;
}

/* hero */
.hero{
text-align:center;
margin-bottom:160px;
}

.profile-wrapper{
position:relative;
display:inline-block;
margin-bottom:40px;
}

.profile-wrapper::before{
content:"";
position:absolute;
inset:-18px;
border-radius:50%;
background:conic-gradient(var(--gold),var(--blue),var(--magenta),var(--gold));
filter:blur(25px);
animation:spin 12s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.profile{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--border);
position:relative;
z-index:2;
}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:-0.03em;
margin-bottom:10px;
background:linear-gradient(90deg,var(--gold),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.username{
color:var(--muted);
margin-bottom:40px;
}

.tagline{
font-family:'Playfair Display',serif;
font-size:28px;
max-width:760px;
margin:auto;
line-height:1.6;
color:#eaeaf0;
}

/* links */
.section-title{
font-size:12px;
letter-spacing:4px;
color:var(--muted);
margin-bottom:60px;
text-align:center;
}

.links{
display:flex;
flex-direction:column;
gap:26px;
}

.link{
display:flex;
align-items:center;
justify-content:space-between;
padding:28px 34px;
border-radius:26px;
background:var(--card);
backdrop-filter:blur(20px);
border:1px solid var(--border);
text-decoration:none;
color:var(--text);
font-size:17px;
transition:all 0.4s cubic-bezier(.16,1,.3,1);
position:relative;
overflow:hidden;
}

.link-left{
display:flex;
align-items:center;
gap:18px;
}

.link svg{
width:24px;
height:24px;
fill:url(#iconGradient);
transition:0.3s ease;
}

.link:hover{
transform:translateX(20px) scale(1.02);
border-color:var(--gold);
box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.link:hover svg{
transform:scale(1.2);
}

/* footer */
footer{
text-align:center;
color:var(--muted);
font-size:14px;
margin-top:200px;
}

/* gradient for icons */
svg defs linearGradient stop:first-child{stop-color:#d6a85f;}
svg defs linearGradient stop:last-child{stop-color:#4ea8ff;}
</style>
</head>
