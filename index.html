<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridho — Expressive Discipline</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
--text:#f4f4f6;
--muted:#9da3b0;
--accent:#c6a15b;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
background:#000;
color:var(--text);
overflow-x:hidden;
cursor:none;
}

/* WebGL Canvas */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* Cursor */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:radial-gradient(circle,var(--accent),transparent 70%);
pointer-events:none;
mix-blend-mode:screen;
z-index:9999;
transition:.1s;
}

/* Layout */
.container{
max-width:860px;
margin:auto;
padding:160px 28px;
position:relative;
z-index:2;
}

.hero{
text-align:center;
margin-bottom:140px;
}

.profile{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.1);
transition:.5s ease;
}
.profile:hover{transform:scale(1.1) rotate(4deg);}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:2px;
transition:.4s ease;
}

.username{
color:var(--muted);
margin:14px 0 40px;
}

.tagline{
font-family:'Playfair Display',serif;
font-size:26px;
min-height:80px;
opacity:.9;
}

/* Philosophy Mode */
.philosophy{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:40px;
z-index:99999;
opacity:0;
pointer-events:none;
transition:.6s ease;
}
.philosophy.active{
opacity:1;
pointer-events:auto;
}
.philosophy h2{
font-family:'Playfair Display',serif;
font-size:42px;
margin-bottom:30px;
}
.philosophy p{
max-width:700px;
line-height:1.8;
color:#bbb;
}

/* Links */
.links{display:flex;flex-direction:column;gap:30px;}
.link{
padding:30px;
border-radius:28px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
gap:20px;
text-decoration:none;
color:white;
font-size:18px;
transition:.4s cubic-bezier(.16,1,.3,1);
transform-style:preserve-3d;
}
.link:hover{
transform:translateY(-12px) rotateX(6deg) rotateY(6deg);
box-shadow:0 40px 120px rgba(255,255,255,.2);
}

.icon{
width:46px;
height:46px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.1);
}
.icon img{width:24px;height:24px;}

footer{
text-align:center;
margin-top:200px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="philosophy" id="philosophy">
<h2>Expressive Discipline</h2>
<p>
Discipline is not restriction. It is structure.  
Structure creates freedom.  
Freedom allows expression.  
Expression defines identity.  
Identity compounds through repetition.
</p>
</div>

<div class="container">

<div class="hero">
<img src="profile.jpg" class="profile">
<h1 id="name">Ridho</h1>
<div class="username">@ridhogeprek</div>
<div class="tagline" id="quote"></div>
</div>

<div class="links">

<a href="#" class="link">
<div class="icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg"></div>
Discord
</a>

<a href="#" class="link">
<div class="icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"></div>
Instagram
</a>

<a href="#" class="link">
<div class="icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></div>
YouTube
</a>

</div>

<footer>
© <script>document.write(new Date().getFullYear())</script> Ridho
</footer>

</div>

<script>

/* Cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* Identity Morph */
const nameEl=document.getElementById("name");
setInterval(()=>{
nameEl.style.letterSpacing=Math.random()*6+"px";
},2000);

/* Quotes */
const quotes=[
"Discipline creates freedom.",
"Silence sharpens identity.",
"Consistency compounds power.",
"Expression requires structure."
];
let i=0;
document.getElementById("quote").innerText=quotes[0];
setInterval(()=>{
i=(i+1)%quotes.length;
document.getElementById("quote").innerText=quotes[i];
},4000);

/* Philosophy Toggle */
document.addEventListener("keydown",e=>{
if(e.key==="p"){
document.getElementById("philosophy").classList.toggle("active");
}
});

/* THREE JS BACKGROUND */
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry=new THREE.IcosahedronGeometry(4,1);
let material=new THREE.MeshStandardMaterial({
color:0xc6a15b,
wireframe:true
});
let mesh=new THREE.Mesh(geometry,material);
scene.add(mesh);

let light=new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

camera.position.z=10;

function animate(){
requestAnimationFrame(animate);
mesh.rotation.x+=0.003;
mesh.rotation.y+=0.004;
renderer.render(scene,camera);
}
animate();

/* Mouse parallax camera */
document.addEventListener("mousemove",e=>{
camera.position.x=(e.clientX/window.innerWidth-0.5)*2;
camera.position.y=-(e.clientY/window.innerHeight-0.5)*2;
camera.lookAt(scene.position);
});

</script>

</body>
</html>
